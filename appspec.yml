version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/html/app

permissions:
  - object: /var/www/html/app
    pattern: "**"
    owner: ec2-user
    group: apache
    mode: 755

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 1500
      runas: root

